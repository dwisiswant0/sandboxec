abi: 6
ignore-if-missing: true
unsafe-host-runtime: true
# Claude CLI runs on Bun, which probes several host runtime files during startup
# (dynamic linker cache, /proc, entropy source, timezone, CPU info).
# These read-only rules keep Bun stable in the sandbox while preserving
# a least-privilege policy for the rest of the filesystem.
fs:
  - rx:$HOME/.local/share/claude
  - rw:$HOME/.claude/
  - rw:$HOME/.claude.json
  - rw:$PWD
  - r:/dev/urandom
  - r:/etc/ld.so.cache
  - r:/etc/hosts
  - r:/etc/resolv.conf
  - r:/etc/nsswitch.conf
  - r:/etc/localtime
  - r:/proc
  - r:/proc/self/maps
  - r:/proc/self/cgroup
  - r:/proc/stat
  - r:/proc/sys/vm/mmap_min_addr
  - r:/proc/sys/vm/overcommit_memory
  - r:/sys/devices/system/cpu/online
net:
  - c:443
